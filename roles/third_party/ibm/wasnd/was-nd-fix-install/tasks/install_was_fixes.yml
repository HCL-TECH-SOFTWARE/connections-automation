---
- name:              Cleanup Binaries directory
  file:              path={{ __tmp_dir }} state=absent
  when:              version_already_installed.rc != 0
  ignore_errors:     true

- name:              Create Binaries directory
  file:              path={{ __tmp_dir }} state=directory mode=0755
  when:              version_already_installed.rc != 0

- name:              Create Logs directory
  file:              path={{ __logs_dir }} state=directory mode=0755
  when:              version_already_installed.rc != 0

- name:              Get WAS Fixes
  unarchive:
    src:             "{{ was_fixes_repository_url }}/{{ item.file_name }}"
    dest:            "{{ __tmp_dir }}/"
    remote_src:      yes
    validate_certs:  false
  with_items:        "{{ __was_fixes_files }}"
  when:              version_already_installed.rc != 0

- name:              Generate WAS Response file
  template:
    src:             "{{ __tpl_file }}"
    dest:            "{{ __rsp_file }}"
  when:              version_already_installed.rc != 0

- name:              Disable Repository on Installation Manager
  replace:
    path:            /var/ibm/InstallationManager/.settings/com.ibm.cic.agent.core.prefs
    regexp:          '(\s*)RepositoryIsOpen=true(\s*)'
    replace:         '\1RepositoryIsOpen=false\2'
    backup:          yes
  ignore_errors:     true

- name:              Check if WAS profiles directory exists
  stat:
    path:            "{{ __was_install_location }}/profiles"
  register:          was_profiles_dir
  changed_when:      false

- name:              Check for running WebSphere processes
  shell:             ps -ef | grep java | grep -E '(dmgr|nodeagent|server1|WebSphere)' | grep -v grep | awk '{print $2}'
  register:          running_was_processes
  failed_when:       false
  changed_when:      false
  when:
    - not was_profiles_dir.stat.exists

- name:              Stop Application Server
  include_role:
    name:            roles/third_party/ibm/wasnd/was-dmgr-stop-cluster
  when:
    - was_profiles_dir.stat.exists

- name:              Stop Dmgr Server
  include_role:
    name:            roles/third_party/ibm/wasnd/was-dmgr-stop
  when:
    - was_profiles_dir.stat.exists

- name:              Stop WAS Nodes
  include_role:
    name:            roles/third_party/ibm/wasnd/was-nodeagent-stop
  when:
    - was_profiles_dir.stat.exists

- name:              Kill running WebSphere processes if found
  shell:             "kill -9 {{ item }}"
  loop:              "{{ running_was_processes.stdout_lines }}"
  when:              
    - running_was_processes.stdout_lines is defined
    - running_was_processes.stdout_lines | length > 0

- name:              Install IBM WAS ND Fixes Software
  command:
    chdir={{ __tmp_dir }}
    {{ __iim_install_location }}/eclipse/tools/imcl -acceptLicense  -preferences com.ibm.cic.common.core.preferences.keepFetchedFiles={{ __iim_keep_fetched_files }},com.ibm.cic.common.core.preferences.preserveDownloadedArtifacts={{ __iim_preserve_artifacts }} -sVP -log {{ __log_file }} input {{ __rsp_file }}
  register:          cout
  changed_when:      ( cout.stdout.find(__was_fp_version_check) != -1)
  when:              version_already_installed.rc != 0


- name:              Cleanup Binaries directory
  file:
    state:           absent
    path:            "{{ __tmp_dir }}"
  when:              version_already_installed.rc != 0
