---
- name:              Use Fix Pack 8.5.5.29?
  set_fact:
    __was_fixes_files:    "{{ __was_fp_files_fp29 }}"
    __was_fp_version_check: "Updated to com.ibm.websphere.ND.v85_{{ __was_fixes_version }}"
    __was_fp_id:    "\"id='com.ibm.websphere.ND.v85' version='{{ __was_fixes_version }}'\""
  when:              ( __was_fixes_version == __was_fp_version_fp29 )

- name:              Use Fix Pack 8.5.5.28?
  set_fact:
    __was_fixes_files:    "{{ __was_fp_files_fp28 }}"
    __was_fp_version_check: "Updated to com.ibm.websphere.ND.v85_{{ __was_fixes_version }}"
    __was_fp_id:    "\"id='com.ibm.websphere.ND.v85' version='{{ __was_fixes_version }}'\""
  when:              ( __was_fixes_version == __was_fp_version_fp28 )

