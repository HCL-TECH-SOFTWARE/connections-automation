- name:                     Install pre-requisites Yum
  package:
    name:                   ['python3-pip']
    state:                  present
  when:
    - ansible_os_family ==  "RedHat"

- name:                     Install pre-requisites Zypper for SUSE
  zypper:
    name:                   ['python3-pip']
    state:                  present
  when:
    - ansible_distribution == "SLES"    

- name:                     Install JMESPath Python library
  pip:
    name:                   jmespath
    state:                  present
